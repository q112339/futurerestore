name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libssl-dev libzip-dev libplist-dev libimobiledevice-dev libirecovery-dev libusb-1.0-0-dev libtool automake autoconf

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      run: |
        cd build
        ./futurerestore --help

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: futurerestore-ubuntu
        path: build/futurerestore*

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        brew update
        brew install cmake openssl libzip libplist libimobiledevice libirecovery libtool automake autoconf

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      run: |
        cd build
        ./futurerestore --help

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: futurerestore-macos
        path: build/futurerestore*

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: |
        choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        choco install openssl
        choco install git

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      run: |
        if (Test-Path build\Release\futurerestore.exe) {
          .\build\Release\futurerestore.exe --help
        } else {
          .\build\futurerestore.exe --help
        }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: futurerestore-windows
        path: |
          build/Release/futurerestore.exe
          build/futurerestore.exe
